<!DOCTYPE html><html><head><style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF;
  font-family: Arial, sans-serif; display: flex; flex-direction: column; }
.header { background: #00703C; padding: 12pt 28pt 10pt; }
.header p { color: #FFFFFF; font-size: 18pt; font-weight: bold; margin: 0; }
.header .sub { color: #A8D5BE; font-size: 9pt; margin: 4pt 0 0 0; }
.content { padding: 14pt 24pt; flex: 1; display: flex; gap: 16pt; }
.col { flex: 1; display: flex; flex-direction: column; }
.col-lbl { color: #C8960C; font-size: 8pt; font-weight: bold; letter-spacing: 1pt; margin: 0 0 6pt 0; }
.ph { flex: 1; background: #F0F8F4; border: 1pt solid #00703C; border-radius: 4pt; }
</style></head><body>
<div class="header">
  <p>Recommended Prices — HDEO &amp; MCO</p>
  <p class="sub">12 HDEO SKUs (DEO 3000 – DEO Max, Dieselube) | 5 MCO SKUs (Blaze 4T, Blaze Xtreme)</p>
</div>
<div class="content">
  <div class="col">
    <p class="col-lbl">DIESEL ENGINE OIL (HDEO)</p>
    <div id="deo-table" class="ph"></div>
  </div>
  <div class="col">
    <p class="col-lbl">MOTORCYCLE OIL (MCO)</p>
    <div id="mco-table" class="ph"></div>
  </div>
</div>
</body></html>
